                    body {
                        margin: 0;
                        height: 100vh;
                    }

                    .main-div {
                        
                        display: flex;
                        height: 100%;
                        align-items: center;
                        justify-content: center;
                        font-family: "SF Pro Display";
                    }

                    .main-div [hidden] {
                        display: none !important;
                    }

                    .main-div .main-feedback-window {
                        display: flex;
                        box-shadow: 0px 6px 28px #25294129;
                        border-radius: 16px;
                        background-color: white;
                        min-width: 460px;
                    }

                    .main-div .main-feedback-window .feedback-block {
                        display: flex;
                        flex-direction: column;
                        padding: 36px;
                        gap: 24px;
                        flex: 1;
                    }

                    .main-div .main-feedback-window .feedback-block .topic {
                        display: flex;
                        justify-content: center;
                    }

                    .main-div .main-feedback-window .feedback-block .title {
                        display: flex;
                        flex-direction: column;
                        gap: 4px;
                    }

                    .main-div .title-text {
                        font-size: 18px;
                        font-weight: 600;
                        line-height: 28px;
                        color: #373737;
                    }

                    .main-div .text {
                        font-size: 15px;
                        font-weight: 400;
                        line-height: 24px;
                        color: #373737;
                    }

                    .main-div .main-feedback-window .window-info-success {
                        display: flex;
                        flex-direction: column;
                        padding: 36px;
                        align-items: center;
                        gap: 16px;
                        width: 100%;
                    }

                    .main-div .main-feedback-window .window-info-success .info {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                    }

                    .main-div .main-feedback-window .window-info-success .text {
                        font-size: 15px;
                        font-weight: 400;
                        line-height: 24px;
                        color: #373737;
                    }

                    .main-div .main-feedback-window .window-info-success .icon {
                        display: flex;
                        padding: 25px;
                        border-radius: 100%;
                        background-color: #EEF8EF;
                    }

                    .main-div .block-score-icon {
                        --color-icon: #FABE00;

                        display: flex;
                        flex: 0 0 auto;
                        flex-direction: column;
                        width: 100%;
                        min-width: 200px;
                        margin: 0;
                        margin-botton: 10px;
                    }

                    .main-div.block-comment {
                        display: flex;
                        flex: 0 0 auto;
                        flex-direction: column;
                        width: 100%;
                        min-width: 200px;
                        margin: 0;
                        margin-botton: 10px;
                    }

                    .main-div .item-block>div {
                        position: relative;
                        flex-wrap: wrap;
                        width: 100%;
                        min-width: 100%;
                        margin-bottom: 12px;
                    }

                    .main-div .block-title {
                        display: flex;
                        color: #666;
                        padding: 0 0 5px;
                        margin-right: 14px;
                    }

                    .main-div .block-title .required {
                        color: red;
                    }

                    .main-div .title {
                        font-weight: 400;
                        font-size: 16px;
                        color: #666;
                        word-wrap: break-word;
                        line-height: 28px;
                    }

                    .main-div .block-control {
                        font-size: 15px;
                        line-height: 24px;
                        width: 100%;
                        flex-basis: 0;
                        flex-grow: 1;
                        display: flex;
                        align-items: center;
                        align-content: center;
                        flex-wrap: wrap;
                        min-width: 160px;
                        gap: 16px;
                    }

                    .main-div .block-control textarea {
                        border-radius: 4px;
                        border: 1px solid #D9D9D9;
                        display: block;
                        width: 100%;
                        padding: 7px 14px;
                        background-color: #fff;
                        background-image: none;
                        background-clip: padding-box;
                        color: #252525;
                        font-size: 14px;
                        line-height: normal;
                        outline: none;
                        min-height: 64px;
                        max-height: 12px;
                        resize: vertical;
                        overflow: auto;
                    }

                    .main-div .block-control textarea:focus {
                        box-shadow: 0 0 4px #1e659980;
                        border-color: #1e659980;
                        transition: none;
                    }

                    .main-div .item-block .score-block {
                        display: flex;
                        flex-direction: row;
                        gap: 12px;
                    }

                    .main-div .score-block-item {
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        width: 28px;
                        height: 28px;
                    }

                    .main-div .score-block-item svg {
                        transition: 0.1s all;
                    }

                    .main-div .score-block-item svg:hover {
                        width: 28px;
                        height: 28px;
                    }

                    .main-div .score-block .score-block-item path {
                        fill: #DFDFDF;
                    }

                    .main-div .item-block .score-block-item.inactive path {
                        fill: #DFDFDF;
                    }

                    .main-div .score-block .score-block-item.active path {
                        fill: var(--color-icon);
                    }

                    .main-div .score-block .score-block-item .block-num-type {
                        width: 20px;
                        height: 20px;
                        display: flex;
                        background-color: #DFDFDF;
                        border-radius: 4px;
                        justify-content: center;
                        align-items: center;
                    }

                    .main-div .score-block .score-block-item .block-num-type span {
                        color: white;
                    }

                    .main-div .score-block .score-block-item.active .block-num-type {
                        background-color: var(--color-icon);
                    }

                    .main-div .button-css {
                        border-radius: 4px;
                        padding: 4px 12px;
                        background-color: #1E6599;
                        color: white;
                        border: 0;
                        font-size: 15px;
                        font-weight: 500;
                        line-height: 24px;
                        cursor: pointer;
                        transition: background-color 0.3s;
                    }

                    .main-div .button-css:hover {
                        background-color: #4b84ad;
                    }

                    .main-div .switcher {
                        display: flex;
                        flex-direction: row;
                        border: 1px solid #DFDFDF;
                        border-radius: 4px;
                    }

                    .main-div .switcher .switcher-item {
                        padding: 4px 16px;
                        background-color: #FFFFFF;
                        cursor: pointer;
                    }

                    .main-div .switcher .switcher-item.active {
                        background-color: #F2F2F2;
                    }

                    .main-div .switcher .switcher-item.active span {
                        color: #373737;
                        font-weight: 600;
                    }

                    .main-div .switcher .switcher-item:first-child {
                        border-radius: 4px 0 0 4px;
                        border-right: 1px solid #DFDFDF;
                    }

                    .main-div .switcher .switcher-item:last-child {
                        border-radius: 0 4px 4px 0;
                    }

                    .main-div .switcher .switcher-item span {
                        font-size: 15px;
                        font-weight: 400;
                        line-height: 24px;
                        color: #808080;
                    }

                                <div id="block-comment" class="control-item" hidden>
                                    <div class="block-comment">
                                        <div>
                                            <div class="block-title">
                                                <span class="title">Комментарий</span>
                                                <span class="required" hidden>*</span>
                                            </div>
                                            <div class="block-control">
                                                <textarea></textarea>
                                            </div>
                                        </div>
                                    </div>

                            </div>
                            <div class="buttons">
                                <elma-button-template class="sv-button" data-twr-classes="sv-button">
                                    <button id="sending" type="button" class="button-css"> Отправить </button>
                                </elma-button-template>
                            </div>
                        </div>
                        <div class="window-info-success" hidden>
                            <div class="icon">
                                <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">

                            <div class="info">
                                <span class="title-text">Отзыв отправлен</span>
                                <span class="text">Спасибо за обратную связь</span>
                            </div>
                        </div>
                    </div>
                </div>
                <script>
                    const is_grade = true;
                    const is_type = 'five_point';
                    const is_need_comment = true;
                    const mandatory_comment_at_low = false;
                    const min_grade = 2;
                    let is_req = false;

                    const value = {
                        request_id: '',
                        is_the_appeal_resolved: true,
                        grade: undefined,
                        tonality: undefined
                    }
                    let is_sending = false;

                    function initForm() {
                        const urlParams = new URLSearchParams(window.location.search);
                        const request_id = urlParams.get('request_id');

                        if(request_id) {
                            value.request_id = request_id;
                            setButtonsListener();
                        }
                        else {
                            alert('Что-то пошло не так');
                        }

                        setAnsweredListener();
                        setScoreListener();
                        checkComment();
                    }

                    function checkComment() {
                        const block_comment = document.querySelector('#block-comment');
                        if(block_comment) {
                            const req_elem = block_comment.querySelector('.required');
                            if(!value.is_the_appeal_resolved) {
                                if(req_elem && req_elem.hasAttribute('hidden')) {
                                    req_elem.removeAttribute('hidden');
                                }
                                if(block_comment.hasAttribute('hidden')) {
                                    block_comment.removeAttribute('hidden');
                                }
                            }
                            else {
                                if(is_need_comment) {
                                    if(block_comment.hasAttribute('hidden')) {
                                        block_comment.removeAttribute('hidden');
                                    }
                                }
                                else {
                                    if(!block_comment.hasAttribute('hidden')) {
                                        block_comment.setAttribute('hidden', '');
                                    }
                                }
                                if(mandatory_comment_at_low) {
                                    if(is_req) {
                                        req_elem.removeAttribute('hidden');
                                    }
                                    else {
                                        req_elem.setAttribute('hidden', '');
                                    }
                                }
                                else {
                                    if(req_elem && !req_elem.hasAttribute('hidden')) {
                                        req_elem.setAttribute('hidden', '');
                                    }
                                }
                            }
                        }
                    }

                    function setButtonsListener() {
                        const block_buttons = document.querySelector('.buttons');
                        if(block_buttons) {
                            const button_sending = block_buttons.querySelector('#sending');
                            if(button_sending) {
                                button_sending.addEventListener('click', clickSendingButton);
                            }
                        }
                    }

                    function clickSendingButton(event) {
                        if(!is_sending) {
                            is_sending = true;

                            const textarea = document.querySelector('#block-comment .block-control textarea');
                            const comment = textarea ? textarea.value : '';

                            if(!value.request_id) {
                                is_sending = false;
                                return alert('Что-то пошло не так');
                            }
                            if(value.is_the_appeal_resolved === undefined) {
                                is_sending = false;
                                return alert('Не указан итог выполнения обращения');
                            }
                            if(is_grade) {
                                if(value.is_the_appeal_resolved) {
                                    if(value.grade === undefined) {
                                        is_sending = false;
                                        return alert('Не указана оценка');
                                    }
                                    if(is_type === 'five_point' && (value.grade < 1 || value.grade > 5)) {
                                        is_sending = false;
                                        return alert('Не корректная оценка');
                                    }
                                    if(is_type === 'ten_point' && (value.grade < 1 || value.grade > 10)) {
                                        is_sending = false;
                                        return alert('Не корректная оценка');
                                    }
                                }
                                else {
                                    value.grade = undefined;
                                }
                            }
                            else {
                                if(value.is_the_appeal_resolved) {
                                    if(!value.tonality) {
                                        is_sending = false;
                                        return alert('Не указана оценка');
                                    }
                                }
                                else {
                                    value.tonality = undefined;
                                }
                            }
                            if(!value.is_the_appeal_resolved || (is_need_comment && mandatory_comment_at_low)) {
                                if(!comment || comment.trim().length === 0){
                                    if(is_grade) {
                                        if(value.grade <= min_grade) {
                                            is_sending = false;
                                            return alert('Не указан комментарий');
                                        }
                                    }
                                    else {
                                        if(value.tonality !== 'neutral' && value.tonality !== 'positive') {
                                            is_sending = false;
                                            return alert('Не указан комментарий');
                                        }
                                    }
                                }
                            }

                            fetch('/elma/sendFeedback', {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    request_id: value.request_id,
                                    has_application_resolved: value.is_the_appeal_resolved,
                                    grade: value.grade,
                                    tonality: value.tonality,
                                    comment: comment
                                })
                            }).then(async res => {
                                
                                const window_info = document.querySelector('.main-div .window-info-success');
                                const feedback_block = document.querySelector('.main-div .feedback-block');
                                
                                if(window_info) {
                                    window_info.removeAttribute("hidden");
                                }
                                if(feedback_block) {
                                    feedback_block.setAttribute("hidden", "");
                                }
                            }).catch(err => {
                                alert('Что-то пошло не так. Попробуй снова чуть позже.');
                                console.log(err.message);
                            });

                            is_sending = false;
                        }
                    }

                    function setScoreListener() {
                        const block_score = document.querySelector('#block-score');
                        if(block_score) {
                            const score_elems = block_score.querySelectorAll('.score-block-item');
                            if(score_elems) {
                                for(const score_elem of score_elems) {
                                    score_elem.addEventListener('click', changeScoreButton);
                                }
                            }
                        }
                    }

                    function setAnsweredListener() {
                        const block_answer = document.querySelector('#block-answer');
                        if(block_answer) {
                            const [button_yes, button_no] = block_answer.querySelectorAll('.switcher-item');
                            if(button_yes && button_no) {
                                button_yes.addEventListener('click', changeAnswerButton);
                                button_no.addEventListener('click', changeAnswerButton);
                            }
                        }
                    }

                    function changeAnswerButton(event) {
                        const elem = event.currentTarget;
                        const [button_yes, button_no] = document.querySelectorAll('#block-answer .switcher-item')
                        if(button_yes && button_no) {
                            if(elem === button_yes) {
                                value.is_the_appeal_resolved = true;
                                if(!elem.classList.contains('active')) {
                                    elem.classList.add('active');
                                }
                                if(button_no.classList.contains('active')) {
                                    button_no.classList.remove('active');
                                }
                            }
                            else if(elem === button_no) {
                                value.is_the_appeal_resolved = false;
                                if(!elem.classList.contains('active')) {
                                    elem.classList.add('active');
                                }
                                if(button_yes.classList.contains('active')) {
                                    button_yes.classList.remove('active');
                                }
                            }
                            const [block_score, comment] = [
                                document.querySelector('#block-score'),
                                document.querySelector('#block-comment')
                            ];

                            if (block_score && comment) {
                                if (value.is_the_appeal_resolved) {
                                    if (block_score.hasAttribute('hidden')) {
                                        block_score.removeAttribute('hidden');
                                    }
                                }
                                else {
                                    if (!block_score.hasAttribute('hidden')) {
                                        block_score.setAttribute('hidden', '');
                                    }
                                }
                                checkComment();
                            }
                        }
                    }

                    function changeScoreButton() {

                        const elem = event.currentTarget;
                        const score_elems = document.querySelectorAll('#block-score .score-block-item');

                        if(score_elems) {
                            if(is_grade) {
                                let is_active = true;
                                for(let i = 0; i < score_elems.length; i++) {
                                    const score_elem = score_elems[i];
                                    if(is_active) {
                                        if(!score_elem.classList.contains('active')) {
                                            score_elem.classList.add('active');
                                        }
                                    }
                                    else {
                                        if(score_elem.classList.contains('active')) {
                                            score_elem.classList.remove('active');
                                        }
                                    }
                                    if(score_elem === elem) {
                                        is_active = false;
                                        value.grade = i + 1;
                                        if(is_need_comment && mandatory_comment_at_low) {
                                            const el = document.querySelector('#block-comment .required');
                                            if(el) {
                                                if(i < min_grade) {
                                                    is_req = true;
                                                    if(el.hasAttribute('hidden')) {
                                                        el.removeAttribute('hidden');
                                                    }
                                                }
                                                else {
                                                    is_req = false;
                                                    if(!el.hasAttribute('hidden')) {
                                                        el.setAttribute('hidden', '');
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            } 
                            else {
                                for(let i = 0; i < score_elems.length; i++) {
                                    const score_elem = score_elems[i];
                                    if(score_elem === elem) {
                                        if(is_need_comment && mandatory_comment_at_low) {
                                            const el = document.querySelector('#block-comment .required');
                                            const attr = score_elem.getAttribute('data-type');
                                            if(el) {
                                                if(attr === 'negative') {
                                                    if(el.hasAttribute('hidden')) {
                                                        el.removeAttribute('hidden');
                                                    }
                                                }
                                                else {
                                                    if(!el.hasAttribute('hidden')) {
                                                        el.setAttribute('hidden', '');
                                                    }
                                                }
                                            }
                                        }
                                        value.tonality = score_elem.getAttribute('data-type');
                                        if(score_elem.classList.contains('inactive')) {
                                            score_elem.classList.remove('inactive');
                                        }
                                    }
                                    else {
                                        if(!score_elem.classList.contains('inactive')) {
                                            score_elem.classList.add('inactive');
                                        }
                                    }
                                }
                            }
                        }
                    }

                    initForm();
                </script>
            </body>
        </html>
